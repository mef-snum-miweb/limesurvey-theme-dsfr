name: Mirror to mef-snum-miweb

# Réplique automatiquement ce repo vers le miroir public ministériel
# `mef-snum-miweb/limesurvey-theme-dsfr`. Deux étages :
#
#   1. push (branches + tags) → mirror-refs : pousse les nouvelles
#      références côté miroir.
#   2. release publiée → mirror-release : recrée la GitHub Release
#      sur le miroir avec les mêmes notes et le même zip attaché.
#
# Pré-requis (à configurer une fois) :
#   - Secret `MEF_SNUM_PAT` au niveau du repo (Settings → Secrets →
#     Actions). Personal Access Token (classic ou fine-grained) avec
#     scope `repo` sur `mef-snum-miweb/limesurvey-theme-dsfr`.

on:
  push:
    branches: ['**']
    tags: ['**']
  release:
    types: [published, edited]

permissions:
  contents: read

jobs:
  mirror-refs:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push branches and tags to mef-snum-miweb
        env:
          PAT: ${{ secrets.MEF_SNUM_PAT }}
        run: |
          if [[ -z "$PAT" ]]; then
            echo "::error::Secret MEF_SNUM_PAT manquant — configurez-le dans Settings → Secrets → Actions."
            exit 1
          fi
          git remote add mirror "https://x-access-token:${PAT}@github.com/mef-snum-miweb/limesurvey-theme-dsfr.git"
          # Pousse toutes les branches et tous les tags. On évite --mirror
          # pour ne pas supprimer côté miroir des refs locales au cas où.
          git push mirror 'refs/heads/*:refs/heads/*' --force
          git push mirror 'refs/tags/*:refs/tags/*' --force

  mirror-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Télécharger les assets de la release source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p /tmp/release-assets
          gh release download "$TAG" --dir /tmp/release-assets --repo "${{ github.repository }}" || true
          ls -la /tmp/release-assets

      - name: Recréer (ou mettre à jour) la release sur mef-snum-miweb
        env:
          GH_TOKEN: ${{ secrets.MEF_SNUM_PAT }}
          TAG: ${{ github.event.release.tag_name }}
          TITLE: ${{ github.event.release.name }}
          NOTES: ${{ github.event.release.body }}
          IS_DRAFT: ${{ github.event.release.draft }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          MIRROR_REPO: mef-snum-miweb/limesurvey-theme-dsfr
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "::error::Secret MEF_SNUM_PAT manquant — configurez-le dans Settings → Secrets → Actions."
            exit 1
          fi
          echo "$NOTES" > /tmp/notes.md
          EXTRA_FLAGS=()
          [[ "$IS_DRAFT" == "true" ]] && EXTRA_FLAGS+=(--draft)
          [[ "$IS_PRERELEASE" == "true" ]] && EXTRA_FLAGS+=(--prerelease)

          # Si la release existe déjà côté miroir, on la supprime puis
          # recrée (pour réuploader les bons assets et notes mises à jour).
          if gh release view "$TAG" --repo "$MIRROR_REPO" >/dev/null 2>&1; then
            echo "Release $TAG existe déjà sur $MIRROR_REPO — suppression avant recréation."
            gh release delete "$TAG" --repo "$MIRROR_REPO" --yes --cleanup-tag=false
          fi

          # Crée la release. Si aucun asset n'a été téléchargé (release
          # sans zip attaché), on appelle gh release create sans fichier.
          ASSETS=(/tmp/release-assets/*)
          if [[ -e "${ASSETS[0]}" ]]; then
            gh release create "$TAG" "${ASSETS[@]}" \
              --repo "$MIRROR_REPO" \
              --title "$TITLE" \
              --notes-file /tmp/notes.md \
              "${EXTRA_FLAGS[@]}"
          else
            gh release create "$TAG" \
              --repo "$MIRROR_REPO" \
              --title "$TITLE" \
              --notes-file /tmp/notes.md \
              "${EXTRA_FLAGS[@]}"
          fi
